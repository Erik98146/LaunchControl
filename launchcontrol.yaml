    # Major menu 2: controls placeholder.

    # Major menu 3: timers page.
    - id: timers_page
      bg_color: 0x000000
      on_load:
        - lambda: |-
            id(settings_visible) = false;
            id(current_page_index) = 1;
            lv_obj_set_style_bg_color(id(dot0), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot1), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot2), lv_color_hex(0xFFFFFF), 0);
            lv_obj_set_style_bg_color(id(dot3), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot4), lv_color_hex(0x555555), 0);

            auto fmt_timer = [](int total_sec) -> std::string {
              if (total_sec < 0) total_sec = 0;
              int hh = total_sec / 3600;
              int mm = (total_sec % 3600) / 60;
              char buf[8];
              snprintf(buf, sizeof(buf), "%d:%02d", hh, mm);
              return std::string(buf);
            };
            lv_label_set_text(id(timers_starlink_remaining_label), fmt_timer(id(starlink_timer_remaining_sec)).c_str());
            lv_label_set_text(id(timers_inverter_remaining_label), fmt_timer(id(inverter_timer_remaining_sec)).c_str());
            lv_label_set_text(id(timers_water_remaining_label), fmt_timer(id(water_timer_remaining_sec)).c_str());

            // Timers page device row: use the same icon size as the Status page.
            // A device icon turns magenta here when that device itself is in timer mode.
            // The small time above each icon is gray by default and turns white while that device timer is active.
            if (id(starlink_state_text).has_state()) {
              std::string s = id(starlink_state_text).state;
              for (auto &c : s) c = std::tolower(static_cast<unsigned char>(c));
              bool on = (s == "on" || s == "1" || s == "true");
              bool timer = (s == "timer");
              lv_obj_set_style_text_color(id(timers_starlink_icon), timer ? lv_color_hex(0xFF00FF) : (on ? lv_color_hex(0xFFD400) : lv_color_hex(0x666666)), 0);
              lv_obj_set_style_text_color(id(timers_starlink_remaining_label), timer ? lv_color_hex(0xFFFFFF) : lv_color_hex(0xAAAAAA), 0);
            } else {
