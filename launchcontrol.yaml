# LVGL UI definition: top-layer overlays and all major/sub pages.
lvgl:
  id: lvgl_comp
  displays:
    - main_display
  buffer_size: 12%
  resume_on_input: false
  page_wrap: false
  top_layer:
    widgets:
      - obj:
          id: dots_container
          align: BOTTOM_MID
          y: -20
          width: 82
          height: 12
          bg_opa: 0%
          border_width: 0
          pad_all: 0
          widgets:
            - obj:
                id: dot0
                x: 0
                y: 0
                width: 10
                height: 10
                radius: 5
                bg_color: 0xFFFFFF
