                      if (pm >= 0 && pm <= 59) mm = pm;
                    }
                  }
                  mm = ((mm + 2) / 5) * 5;
                  if (mm >= 60) mm = 55;
                  id(timer_edit_hour) = hh;
                  id(timer_edit_minute) = mm;
