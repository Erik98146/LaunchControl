    internal: true
    on_value:
      - lambda: |-
          // Starlink UI state expects text values: off, on, or timer.
          // MQTT writes remain unchanged elsewhere; only the incoming display state changes here.
          std::string s = x;
          for (auto &c : s) c = std::tolower(static_cast<unsigned char>(c));
          bool on = (s == "on" || s == "1" || s == "true");
          bool timer = (s == "timer");
          lv_color_t starlink_color = timer ? lv_color_hex(0xFFF3A0) : (on ? lv_color_hex(0xFFD400) : lv_color_hex(0x666666));
          lv_obj_set_style_text_color(id(status_starlink_icon), starlink_color, 0);
          lv_obj_set_style_text_color(id(saver_starlink_icon), starlink_color, 0);
