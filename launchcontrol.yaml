  - platform: mqtt_subscribe
    id: ac_temp_text
    topic: ${mqtt_ac_temp_topic}
    internal: true
    on_value:
      - lambda: |-
          lv_label_set_text(id(climate_room_temp_label), x.c_str());

  - platform: mqtt_subscribe
    id: ac_set_text
    topic: ${mqtt_ac_set_topic}
    internal: true
    on_value:
      - lambda: |-
          lv_label_set_text(id(climate_set_temp_label), x.c_str());

  - platform: mqtt_subscribe
    id: ac_mode_text
    topic: ${mqtt_ac_mode_topic}
    internal: true
    on_value:
      - lambda: |-
          std::string s = x;
          for (auto &c : s) c = std::tolower(static_cast<unsigned char>(c));
          bool on = (s == "true" || s == "on" || s == "1");
          lv_obj_set_style_text_color(id(climate_mode_icon), on ? lv_color_hex(0x3399FF) : lv_color_hex(0x666666), 0);
          lv_label_set_text(id(climate_mode_value_label), on ? "Cool" : "Off");

  - platform: mqtt_subscribe
    id: cpu_load_text
    topic: ${mqtt_cpu_load_topic}
    internal: true
    on_value:
      - lambda: |-
          std::string s = std::string("Cerbo CPU load: ") + x + "%";
          lv_label_set_text(id(cpu_load_label), s.c_str());

  - platform: mqtt_subscribe
    id: battery_remain
    topic: ${mqtt_battery_remain_topic}
    internal: true
    on_value:
      - lambda: |-
          lv_label_set_text(id(dash_remain_label), x.c_str());
  - platform: mqtt_subscribe
    id: battery_load_text
    topic: ${mqtt_battery_load_topic}
    internal: true
    on_value:
      - lambda: |-
          // Battery load drives the live watts text and whether the animated charging icon should run.
          std::string s = x;
          size_t p = s.find('W');
          if (p != std::string::npos) s = s.substr(0, p + 1);
          while (!s.empty() && s.back() == ' ') s.pop_back();
          id(battery_load_display) = s.empty() ? std::string("--") : s;
          lv_label_set_text(id(dash_load_label), id(battery_load_display).c_str());
          lv_obj_set_style_text_color(id(dash_load_label), lv_color_hex(0xFFFFFF), 0);

          float load_w = 0.0f;
          bool have_load = sscanf(id(battery_load_display).c_str(), "%f", &load_w) == 1;
          bool charging = have_load && load_w > 0.0f;
          id(battery_charging_active) = charging;
          if (!charging && id(battery_soc).has_state()) {
            float soc = id(battery_soc).state;
            const char *icon = "󰁺";
            if (soc >= 95) icon = "󰁹";
            else if (soc >= 85) icon = "󰂂";
            else if (soc >= 75) icon = "󰂁";
            else if (soc >= 65) icon = "󰂀";
            else if (soc >= 55) icon = "󰁿";
            else if (soc >= 45) icon = "󰁾";
            else if (soc >= 35) icon = "󰁽";
            else if (soc >= 25) icon = "󰁼";
            else if (soc >= 15) icon = "󰁻";
            lv_label_set_text(id(dash_battery_icon), icon);
          }

# Numeric inputs and runtime measurements.
sensor:
  - platform: mqtt_subscribe
    id: battery_soc
    topic: ${mqtt_battery_soc_topic}
    unit_of_measurement: "%"
    accuracy_decimals: 0
    internal: true
    on_value:
      - lambda: |-
          char buf[16];
          snprintf(buf, sizeof(buf), "%.0f %%", x);
          lv_label_set_text(id(dash_soc_label), buf);
          lv_color_t color;
          if (x > 70) color = lv_color_hex(0x00CC66);
          else if (x > 50) color = lv_color_hex(0xFFFF00);
          else if (x > 25) color = lv_color_hex(0xFF8800);
          else color = lv_color_hex(0xFF4444);
          lv_obj_set_style_text_color(id(dash_soc_label), color, 0);
          lv_obj_set_style_text_color(id(dash_battery_icon), color, 0);
          lv_obj_set_style_text_color(id(ss_soc_label), color, 0);
          lv_label_set_text(id(ss_soc_label), buf);

          // Only apply the static SOC icon when the charging animation is not active.
          if (!id(battery_charging_active)) {
            const char *icon = "󰁺";
            if (x >= 95) icon = "󰁹";
            else if (x >= 85) icon = "󰂂";
            else if (x >= 75) icon = "󰂁";
            else if (x >= 65) icon = "󰂀";
            else if (x >= 55) icon = "󰁿";
            else if (x >= 45) icon = "󰁾";
            else if (x >= 35) icon = "󰁽";
            else if (x >= 25) icon = "󰁼";
            else if (x >= 15) icon = "󰁻";
            lv_label_set_text(id(dash_battery_icon), icon);
          }
  - platform: wifi_signal
    id: wifi_rssi
    update_interval: 60s
    internal: true
    on_value:
      - lambda: |-
          char rbuf[24];
          snprintf(rbuf, sizeof(rbuf), "Signal: %.0f dBm", x);
          lv_label_set_text(id(wifi_value_label), rbuf);
  - platform: uptime
    id: uptime_sensor
    internal: true
    on_value:
      - lambda: |-
          uint32_t total = (uint32_t) x;
          uint32_t days = total / 86400;
          uint32_t hours = (total % 86400) / 3600;
          uint32_t minutes = (total % 3600) / 60;
          char ubuf[40];
          if (days > 0) {
            snprintf(ubuf, sizeof(ubuf), "%u d %u h %u m", days, hours, minutes);
          } else if (hours > 0) {
            snprintf(ubuf, sizeof(ubuf), "%u h %u m", hours, minutes);
          } else {
            snprintf(ubuf, sizeof(ubuf), "%u m", minutes);
          }
          lv_label_set_text(id(uptime_value_label), ubuf);

# Background tasks: dimming/screensaver control, status refresh, and local clock ticking.
interval:
  - interval: 500ms
    then:
      - lambda: |-
          uint32_t idle_ms = lv_disp_get_inactive_time(NULL);
          int mode = id(screensaver_mode);
          if (id(screensaver_active)) {
            if (idle_ms < 250) {
              lv_obj_add_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
              id(main_display).set_brightness((id(night_mode_active) ? id(night_dim_pct) : id(screen_brightness_pct)) * 255 / 100);
              id(screensaver_active) = false;
              id(screen_state) = 0;
            }
            return;
          }
          if (id(dim_timeout_sec) > 0 && idle_ms >= (uint32_t)(id(dim_timeout_sec) * 1000) && id(screen_state) == 0) {
            id(main_display).set_brightness(38);
            id(screen_state) = 1;
          }
          if (id(screen_state) == 1 && (id(dim_timeout_sec) == 0 || idle_ms < (uint32_t)(id(dim_timeout_sec) * 1000))) {
            id(main_display).set_brightness((id(night_mode_active) ? id(night_dim_pct) : id(screen_brightness_pct)) * 255 / 100);
            id(screen_state) = 0;
          }
          if (id(off_timeout_sec) > 0 && idle_ms >= (uint32_t)(id(off_timeout_sec) * 1000)) {
            if (mode == 0) {
              lv_obj_add_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
              id(main_display).set_brightness(0);
              id(screensaver_active) = false;
              id(screen_state) = 3;
            } else {
              lv_obj_clear_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
              id(main_display).set_brightness(id(saver_brightness_pct) * 255 / 100);
              id(screensaver_active) = true;
              id(screensaver_start_ms) = millis();
              id(screen_state) = 2;
            }
          }
  - interval: 15s
    then:
      - lambda: |-
          if (id(device_ssid).has_state()) {
            std::string s = std::string("SSID: ") + id(device_ssid).state;
            lv_label_set_text(id(wifi_ssid_label), s.c_str());
          }
          if (id(device_ip).has_state()) {
            std::string s = std::string("IP: ") + id(device_ip).state;
            lv_label_set_text(id(wifi_ip_label), s.c_str());
          }
          if (id(wifi_rssi).has_state()) {
            char rbuf[24];
            snprintf(rbuf, sizeof(rbuf), "Signal: %.0f dBm", id(wifi_rssi).state);
            lv_label_set_text(id(wifi_value_label), rbuf);
          }
          lv_label_set_text(id(mqtt_status_label), id(mqtt_connected) ? "MQTT: Connected" : "MQTT: Disconnected");
  - interval: 700ms
    then:
      - lambda: |-
          // Animate the status-page battery icon while charging. Colors are left alone so SOC color coding stays intact.
          if (id(battery_charging_active)) {
            static const char *icons[] = {"󰂄", "󰂆", "󰂇", "󰂈", "󰢝"};
            id(battery_charge_anim_step) = (id(battery_charge_anim_step) + 1) % 5;
            lv_label_set_text(id(dash_battery_icon), icons[id(battery_charge_anim_step)]);
          }
  - interval: 700ms
    then:
      - lambda: |-
          // Pulse the Starlink icon while its UI state is timer so the status page and
          // screensaver show a visible glow distinct from the normal ON state.
          if (id(starlink_timer_mode)) {
            static const uint32_t glow_colors[] = {0xFFE680, 0xFFD400, 0xFFF3A0, 0xFFD400};
            id(starlink_timer_glow_step) = (id(starlink_timer_glow_step) + 1) % 4;
            auto glow = lv_color_hex(glow_colors[id(starlink_timer_glow_step)]);
            lv_obj_set_style_text_color(id(status_starlink_icon), glow, 0);
            lv_obj_set_style_text_color(id(saver_starlink_icon), glow, 0);
          }
  - interval: 700ms
    then:
      - lambda: |-
          // Pulse the inverter icon while its UI state is timer so the status page and
          // screensaver show a visible glow distinct from the normal ON state.
          if (id(inverter_timer_mode)) {
            static const uint32_t glow_colors[] = {0xFFE680, 0xFFD400, 0xFFF3A0, 0xFFD400};
            id(inverter_timer_glow_step) = (id(inverter_timer_glow_step) + 1) % 4;
            auto glow = lv_color_hex(glow_colors[id(inverter_timer_glow_step)]);
            lv_obj_set_style_text_color(id(status_inverter_icon), glow, 0);
            lv_obj_set_style_text_color(id(saver_inverter_icon), glow, 0);
          }
  - interval: 700ms
    then:
      - lambda: |-
          // Pulse the water icon while its UI state is timer so the status page and
          // screensaver show a visible cyan glow distinct from the normal ON state.
          if (id(water_timer_mode)) {
            static const uint32_t glow_colors[] = {0x66E6FF, 0x33CCFF, 0xA6F5FF, 0x33CCFF};
            id(water_timer_glow_step) = (id(water_timer_glow_step) + 1) % 4;
            auto glow = lv_color_hex(glow_colors[id(water_timer_glow_step)]);
            lv_obj_set_style_text_color(id(status_water_icon), glow, 0);
            lv_obj_set_style_text_color(id(saver_water_icon), glow, 0);
          }
  - interval: 1s
    then:
      - lambda: |-
          auto update_countdown_label = [](lv_obj_t *label, int total_sec) {
            if (total_sec < 0) total_sec = 0;
            char buf[8];
            snprintf(buf, sizeof(buf), "%d:%02d", total_sec / 3600, (total_sec % 3600) / 60);
            lv_label_set_text(label, buf);
          };

          if (id(starlink_timer_mode) && id(starlink_timer_remaining_sec) > 0) id(starlink_timer_remaining_sec) -= 1;
          if (id(inverter_timer_mode) && id(inverter_timer_remaining_sec) > 0) id(inverter_timer_remaining_sec) -= 1;
          if (id(water_timer_mode) && id(water_timer_remaining_sec) > 0) id(water_timer_remaining_sec) -= 1;

          update_countdown_label(id(timers_starlink_remaining_label), id(starlink_timer_remaining_sec));
          update_countdown_label(id(timers_inverter_remaining_label), id(inverter_timer_remaining_sec));
          update_countdown_label(id(timers_water_remaining_label), id(water_timer_remaining_sec));

          if (!id(clock_valid)) return;

          auto leap = [](int year) -> bool {
            return ((year % 4 == 0) && (year % 100 != 0)) || (year % 400 == 0);
          };
          auto dim = [&](int year, int month) -> int {
            static const int days[] = {31,28,31,30,31,30,31,31,30,31,30,31};
            if (month == 2 && leap(year)) return 29;
            return days[month - 1];
          };

          id(clock_second) += 1;
          if (id(clock_second) >= 60) {
            id(clock_second) = 0;
            id(clock_minute) += 1;
          }
          if (id(clock_minute) >= 60) {
            id(clock_minute) = 0;
            id(clock_hour) += 1;
          }
          if (id(clock_hour) >= 24) {
            id(clock_hour) = 0;
            id(clock_day) += 1;
          }
          int max_day = dim(id(clock_year), id(clock_month));
          if (id(clock_day) > max_day) {
            id(clock_day) = 1;
            id(clock_month) += 1;
          }
          if (id(clock_month) > 12) {
            id(clock_month) = 1;
            id(clock_year) += 1;
          }

                      auto leap_tz = [](int year) -> bool {
                        return ((year % 4 == 0) && (year % 100 != 0)) || (year % 400 == 0);
                      };
                      auto dim_tz = [&](int year, int month) -> int {
                        static const int days[] = {31,28,31,30,31,30,31,31,30,31,30,31};
                        if (month == 2 && leap_tz(year)) return 29;
                        return days[month - 1];
                      };
                      auto normalize = [&](int &year, int &month, int &day, int &hour) {
                        while (hour < 0) {
                          hour += 24;
                          day -= 1;
                          if (day < 1) {
                            month -= 1;
                            if (month < 1) { month = 12; year -= 1; }
                            day = dim(year, month);
                          }
                        }
                        while (hour >= 24) {
                          hour -= 24;
                          day += 1;
                          int max_day = dim(year, month);
                          if (day > max_day) {
                            day = 1;
                            month += 1;
                            if (month > 12) { month = 1; year += 1; }
                          }
                        }
                      };
                      auto dow = [](int year, int month, int day) -> int {
                        if (month < 3) { month += 12; year -= 1; }
                        int K = year % 100;
                        int J = year / 100;
                        int h = (day + (13 * (month + 1)) / 5 + K + K / 4 + J / 4 + 5 * J) % 7;
                        return (h + 6) % 7;
                      };
                      auto nth_sunday = [&](int year, int month, int n) -> int {
                        int first_dow = dow(year, month, 1);
                        int first_sunday = (first_dow == 0) ? 1 : (8 - first_dow);
                        return first_sunday + (n - 1) * 7;
                      };

                      int y = id(clock_year);
                      int mo = id(clock_month);
                      int d = id(clock_day);
                      int h = id(clock_hour);
                      int mi = id(clock_minute);

                      const int offsets[] = {-8, -7, -6, -5};
                      int tz = id(clock_tz_region);
                      if (tz < 0 || tz > 3) tz = 0;
                      h += offsets[tz];
                      normalize(y, mo, d, h);

                      bool dst = false;
                      int start_day = nth_sunday(y, 3, 2);
                      int end_day = nth_sunday(y, 11, 1);
                      if (mo > 3 && mo < 11) dst = true;
                      else if (mo == 3) dst = (d > start_day) || (d == start_day && h >= 2);
                      else if (mo == 11) dst = (d < end_day) || (d == end_day && h < 2);

                      if (dst) {
                        h += 1;
                        normalize(y, mo, d, h);
                      }

                      bool pm = h >= 12;
                      int hr12 = h % 12;
                      if (hr12 == 0) hr12 = 12;

                      int now_min = h * 60 + mi;
                      int start_min = id(night_start_hour) * 60 + id(night_start_minute);
                      int stop_min = id(night_stop_hour) * 60 + id(night_stop_minute);
                      bool nactive = false;
                      if (id(auto_night_mode)) {
                        if (start_min == stop_min) nactive = true;
                        else if (start_min < stop_min) nactive = (now_min >= start_min && now_min < stop_min);
                        else nactive = (now_min >= start_min || now_min < stop_min);
                      }
                      id(night_mode_active) = nactive;

                      char tbuf[16];
                      snprintf(tbuf, sizeof(tbuf), "%d:%02d", hr12, mi);
                      lv_label_set_text(id(saver_time_label), tbuf);
                      lv_label_set_text(id(saver_ampm_label), pm ? "PM" : "AM");