# LaunchControl - Waveshare 1.75 AMOLED dashboard for ESPHome by Erik Utter
# LaunchControl Version: ${launch_control_version}
# Based on: van54.yaml
# Changes in this version:
#   - Renamed project branding to LaunchControl
#   - Added easy-to-update Launch Control version substitution
#   - Removed the time preview from the timer-setting page and tightened layout
#   - Fixed timer button interaction so short press toggles and long press opens settings without toggling
#   - Added LaunchControl name and version to the Settings/About page
#   - Added Starlink timer-mode handling to match the inverter status icon behavior
#   - Added Starlink timer glow on the status page and screensaver when magtag/starlink/state = timer
#   - Added Water timer-mode handling to match the inverter status icon behavior while keeping water cyan
#   - Added Water timer glow on the status page and screensaver when magtag/water/state = timer
#   - Updated the Timers page layout: larger device icons, lower device row, lower time, and lower sleep-timer icon
#   - Added timer-mode long-press behavior to the Timers page device icons and magenta timer-state indication there
#   - Timers page label changed to "Start Timer" and moved down; sleep-timer label moved up and changed to white
#   - BOOT button mapped: press goes to Status; press from Status jumps immediately to Screensaver
#   - Timers page now shows per-device timer countdown labels above Starlink, Inverter, and Water
#   - Timers page title moved up and renamed to "Device Timers"; countdown labels turn white while active
#   - Night Mode moved to its own settings page with persistent start/stop times and night dim level
#   - Added night-mode time scroller popup and automatic night brightness override during active night hours
# Major sections:
#   - substitutions: easy-to-change topics, broker, and device names
#   - esphome/on_boot: restore saved settings and initialize display/touch state
#   - globals: persistent UI and settings state
#   - hardware buses/display/touchscreen: Waveshare board wiring and drivers
#   - wifi/mqtt: network connectivity and Cerbo/Node-RED integration
#   - fonts/lvgl: UI fonts, overlay layers, and page definitions
#   - text_sensor/sensor: inbound MQTT data and live system status
#   - interval: dimming, screensaver, network refresh, and local clock tick logic
#

substitutions:
  project_name: "LaunchControl"
  launch_control_version: "0.68"
  device_name: campervan32
  friendly_name: ${project_name}
  mqtt_broker: 192.168.1.115
  mqtt_port: "1883"
  mqtt_time_topic: magtag/time
  mqtt_battery_soc_topic: magtag/battery/soc
  mqtt_battery_load_topic: magtag/battery/load
  mqtt_battery_remain_topic: magtag/battery/remain
  mqtt_temp_in_topic: magtag/temp/in
  mqtt_temp_out_topic: magtag/temp/out
  mqtt_starlink_state_topic: magtag/starlink/state
  mqtt_inverter_state_topic: magtag/inverter/state
  mqtt_water_state_topic: magtag/water/state
  mqtt_starlink_button_topic: magtag/starlink/button
  mqtt_inverter_button_topic: magtag/inverter/button
  mqtt_water_button_topic: magtag/water/button
  mqtt_cpu_load_topic: magtag/cpu/load
  mqtt_timer_state_topic: magtag/timer/state
  mqtt_timer_time_topic: magtag/timer/time
  mqtt_timer_button_topic: magtag/timer/button
  mqtt_timer_set_topic: magtag/timer/set
  mqtt_ac_temp_topic: magtag/ac/temp
  mqtt_ac_set_topic: magtag/ac/set
  mqtt_ac_mode_topic: magtag/ac/mode
  mqtt_temp_change_topic: magtag/temp/change

# Core ESPHome device setup and boot-time restore logic.
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.11.0
  name_add_mac_suffix: false
  on_boot:
    - priority: 500
      then:
        - lambda: |-
            int rot = id(screen_rotation);
            display::DisplayRotation rotations[] = {
              display::DISPLAY_ROTATION_0_DEGREES,
              display::DISPLAY_ROTATION_270_DEGREES,
              display::DISPLAY_ROTATION_180_DEGREES,
              display::DISPLAY_ROTATION_90_DEGREES
            };
            if (rot < 0 || rot > 3) rot = 0;
            id(main_display).set_rotation(rotations[rot]);
            switch (rot) {
              case 0:
                id(my_touchscreen).set_mirror_x(true);
                id(my_touchscreen).set_mirror_y(true);
                id(my_touchscreen).set_swap_xy(false);
                break;
              case 1:
                id(my_touchscreen).set_mirror_x(false);
                id(my_touchscreen).set_mirror_y(true);
                id(my_touchscreen).set_swap_xy(true);
                break;
              case 2:
                id(my_touchscreen).set_mirror_x(false);
                id(my_touchscreen).set_mirror_y(false);
                id(my_touchscreen).set_swap_xy(false);
                break;
              case 3:
                id(my_touchscreen).set_mirror_x(true);
                id(my_touchscreen).set_mirror_y(false);
                id(my_touchscreen).set_swap_xy(true);
                break;
            }
    - priority: -100
      then:
        - delay: 300ms
        - lambda: |-
            ESP_LOGI("campervan", "Cerbo MQTT dashboard booted");
            id(main_display).set_brightness((id(night_mode_active) ? id(night_dim_pct) : id(screen_brightness_pct)) * 255 / 100);
            const char* dim_labels[] = {"Never", "15 sec", "30 sec", "1 min", "2 min"};
            int dim_vals[] = {0, 15, 30, 60, 120};
            for (int i = 0; i < 5; i++) if (dim_vals[i] == id(dim_timeout_sec)) { lv_label_set_text(id(dim_value_label), dim_labels[i]); break; }
            const char* off_labels[] = {"Never", "30 sec", "1 min", "2 min", "5 min"};
            int off_vals[] = {0, 30, 60, 120, 300};
            for (int i = 0; i < 5; i++) if (off_vals[i] == id(off_timeout_sec)) { lv_label_set_text(id(off_value_label), off_labels[i]); break; }
            const char* saver_labels[] = {"Off", "Clock"};
            lv_label_set_text(id(saver_value_label), saver_labels[id(screensaver_mode) > 0 ? 1 : 0]);
            char bbuf[12];
            snprintf(bbuf, sizeof(bbuf), "%d %%", id(screen_brightness_pct));
            lv_label_set_text(id(screen_bright_label), bbuf);
            snprintf(bbuf, sizeof(bbuf), "%d %%", id(saver_brightness_pct));
            lv_label_set_text(id(saver_bright_label), bbuf);
            lv_label_set_text(id(night_mode_label), id(auto_night_mode) ? "On" : "Off");
            char nbuf[8];
            snprintf(nbuf, sizeof(nbuf), "%d %%", id(night_dim_pct));
            lv_label_set_text(id(night_dim_label), nbuf);
            char tbuf2[8];
            snprintf(tbuf2, sizeof(tbuf2), "%02d:%02d", id(night_start_hour), id(night_start_minute));
            lv_label_set_text(id(night_start_value_label), tbuf2);
            snprintf(tbuf2, sizeof(tbuf2), "%02d:%02d", id(night_stop_hour), id(night_stop_minute));
            lv_label_set_text(id(night_stop_value_label), tbuf2);
            const char* rot_labels[] = {"0°", "90°", "180°", "270°"};
            int rot = id(screen_rotation);
            if (rot < 0 || rot > 3) rot = 0;
            lv_label_set_text(id(rotation_value_label), rot_labels[rot]);
            id(lvgl_comp)->show_page(0, LV_SCR_LOAD_ANIM_NONE, 0);

# ESP32-S3 board and framework tuning.
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_I2C_SKIP_LEGACY_CONFLICT_CHECK: "y"

psram:
  mode: octal
  speed: 80MHz

# Persistent and runtime UI/settings state used throughout the dashboard.
globals:
  - id: screen_rotation
    type: int
    restore_value: yes
    initial_value: '0'
  - id: screen_state
    type: int
    restore_value: no
    initial_value: '0'
  - id: current_page_index
    type: int
    restore_value: no
    initial_value: '0'
  - id: settings_visible
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: mqtt_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: dim_timeout_sec
    type: int
    restore_value: yes
    initial_value: '30'
  - id: off_timeout_sec
    type: int
    restore_value: yes
    initial_value: '60'
  - id: screensaver_mode
    type: int
    restore_value: yes
    initial_value: '1'
  - id: screen_brightness_pct
    type: int
    restore_value: yes
    initial_value: '100'
  - id: saver_brightness_pct
    type: int
    restore_value: yes
    initial_value: '10'
  - id: auto_night_mode
    type: int
    restore_value: yes
    initial_value: '0'
  - id: night_mode_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: night_start_hour
    type: int
    restore_value: yes
    initial_value: '22'
  - id: night_start_minute
    type: int
    restore_value: yes
    initial_value: '0'
  - id: night_stop_hour
    type: int
    restore_value: yes
    initial_value: '7'
  - id: night_stop_minute
    type: int
    restore_value: yes
    initial_value: '0'
  - id: night_dim_pct
    type: int
    restore_value: yes
    initial_value: '20'
  - id: night_edit_hour
    type: int
    restore_value: no
    initial_value: '22'
  - id: night_edit_minute
    type: int
    restore_value: no
    initial_value: '0'
  - id: night_edit_target
    type: int
    restore_value: no
    initial_value: '0'
  - id: screensaver_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: screensaver_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: battery_load_display
    type: std::string
    restore_value: no
    initial_value: '"--"'
  - id: clock_valid
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: clock_year
    type: int
    restore_value: no
    initial_value: '2026'
  - id: clock_month
    type: int
    restore_value: no
    initial_value: '1'
  - id: clock_day
    type: int
    restore_value: no
    initial_value: '1'
  - id: clock_hour
    type: int
    restore_value: no
    initial_value: '0'
  - id: clock_minute
    type: int
    restore_value: no
    initial_value: '0'
  - id: clock_second
    type: int
    restore_value: no
    initial_value: '0'
  # Control-page timer mode latches. Long-press sets Timer mode; a state update or a normal tap clears it.
  - id: starlink_timer_mode
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: inverter_timer_mode
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: water_timer_mode
    type: bool
    restore_value: no
    initial_value: 'false'
  # Guards to suppress the click event that fires when a long-press is released.
  - id: starlink_ignore_next_click
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: inverter_ignore_next_click
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: water_ignore_next_click
    type: bool
    restore_value: no
    initial_value: 'false'
  # Press timing for the status-page inverter button so we can distinguish
  # short/no-op, long/toggle, and very-long/timer actions without double-firing.
  - id: inverter_status_press_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  # Press timing for the status-page starlink button so it can match the inverter icon behavior:
  #   short press      = no action
  #   long press       = normal toggle behavior
  #   very long press  = send timer
  - id: starlink_status_press_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  # Press timing for the status-page water button so it can match the inverter icon behavior:
  #   short press      = no action
  #   long press       = normal toggle behavior
  #   very long press  = send timer
  - id: water_status_press_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  # Screensaver clock time zone: 0=PT, 1=MT, 2=CT, 3=ET. Persistent across reboots.
  - id: clock_tz_region
    type: int
    restore_value: yes
    initial_value: '0'
  # Temporary edit values for the Timers page set-time popup.
  - id: timer_edit_hour
    type: int
    restore_value: no
    initial_value: '2'
  - id: timer_edit_minute
    type: int
    restore_value: no
    initial_value: '0'
  # Suppresses the timer toggle click event after a long-press opens the timer-setting page.
  - id: timer_ignore_next_click
    type: bool
    restore_value: no
    initial_value: 'false'
  # Battery charging animation state for the status-page icon.
  - id: battery_charging_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: battery_charge_anim_step
    type: int
    restore_value: no
    initial_value: '0'
  - id: inverter_timer_glow_step
    type: int
    restore_value: no
    initial_value: '0'
  - id: starlink_timer_glow_step
    type: int
    restore_value: no
    initial_value: '0'
  - id: water_timer_glow_step
    type: int
    restore_value: no
    initial_value: '0'
  # Per-device timer countdowns shown on the Timers page. These are started when the
  # corresponding MQTT state changes into timer mode and count down locally from the
  # configured default durations shown above each icon.
  - id: starlink_timer_remaining_sec
    type: int
    restore_value: no
    initial_value: '3600'
  - id: inverter_timer_remaining_sec
    type: int
    restore_value: no
    initial_value: '3600'
  - id: water_timer_remaining_sec
    type: int
    restore_value: no
    initial_value: '900'

# Hardware buses used by the display, touch controller, and RTC-capable peripherals.
i2c:
  sda: GPIO15
  scl: GPIO14
  frequency: 400kHz

spi:
  - id: display_spi
    type: quad
    clk_pin: GPIO38
    data_pins:
      - 4
      - 5
      - 6
      - 7

# AMOLED display driver.
display:
  - platform: mipi_spi
    model: WAVESHARE-ESP32-S3-TOUCH-AMOLED-1.75
    id: main_display
    spi_id: display_spi
    color_order: RGB
    brightness: 255
    update_interval: never
    init_sequence:
      - [0xFE, 0x20]
      - [0x19, 0x10]
      - [0x1C, 0xA0]
      - [0xFE, 0x00]
      - [0x63, 0xFF]

# External CST9217 touch component for the Waveshare board.
external_components:
  - source:
      type: git
      url: https://github.com/shelson/esphome-cst9217
    components: [cst9217]

# Touch controller. Rotation transforms are also updated dynamically at runtime.
touchscreen:
  - platform: cst9217
    id: my_touchscreen
    interrupt_pin: GPIO11
    reset_pin: GPIO40
    transform:
      mirror_x: true
      mirror_y: true

# Logging and diagnostics.
logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG
  logs:
    sensor: WARN
    text_sensor: WARN

# OTA update support.
ota:
  - platform: esphome

# Wi-Fi client setup. DHCP is used; do not add manual_ip unless intentionally static.
wifi:
  reboot_timeout: 0s
  fast_connect: true
  power_save_mode: LIGHT
  use_psram: true
  on_connect:
    then:
      - logger.log: "WiFi connected"
      - lvgl.label.update:
          id: wifi_value_label
          text: "Updating..."
  on_disconnect:
    then:
      - logger.log: "WiFi disconnected"
      - lvgl.label.update:
          id: wifi_value_label
          text: "Offline"
      - lvgl.label.update:
          id: wifi_ssid_label
          text: "SSID: --"
      - lvgl.label.update:
          id: wifi_ip_label
          text: "IP: --"
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Cerbo/Node-RED MQTT connection and connection-state tracking.
mqtt:  
  id: mqtt_client
  broker: !secret mqtt_broker_ip
  port: ${mqtt_port}
  discovery: false
  topic_prefix: ${device_name}
  keepalive: 15s
  reboot_timeout: 0s
  birth_message:
    topic: ${device_name}/status
    payload: online
    retain: true
  will_message:
    topic: ${device_name}/status
    payload: offline
    retain: true
  on_connect:
    then:
      - logger.log: "MQTT connected"
      - lambda: |-
          id(mqtt_connected) = true;
          lv_label_set_text(id(mqtt_status_label), "MQTT: Connected");
  on_disconnect:
    then:
      - logger.log: "MQTT disconnected"
      - lambda: |-
          id(mqtt_connected) = false;
          lv_label_set_text(id(mqtt_status_label), "MQTT: Disconnected");


# BOOT button on GPIO0: if pressed from any non-status page (or while screensaver is active),
# jump to the Status page immediately and wake the screen. If already on the Status page,
# pressing BOOT goes straight to the screensaver with no idle delay.
binary_sensor:
  - platform: gpio
    id: boot_button
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    internal: true
    on_press:
      - lambda: |-
          if (id(screensaver_active) || id(current_page_index) != 0) {
            lv_obj_add_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
            id(main_display).set_brightness((id(night_mode_active) ? id(night_dim_pct) : id(screen_brightness_pct)) * 255 / 100);
            id(screensaver_active) = false;
            id(screen_state) = 0;
            id(lvgl_comp)->show_page(0, LV_SCR_LOAD_ANIM_NONE, 0);
            return;
          }

          // Already on Status: enter screensaver immediately.
          if (id(screensaver_mode) == 0) {
            lv_obj_add_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
            id(main_display).set_brightness(0);
            id(screensaver_active) = false;
            id(screen_state) = 3;
          } else {
            lv_obj_clear_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
            id(main_display).set_brightness(id(saver_brightness_pct) * 255 / 100);
            id(screensaver_active) = true;
            id(screensaver_start_ms) = millis();
            id(screen_state) = 2;
          }

