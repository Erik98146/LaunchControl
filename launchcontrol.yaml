                  // Ignore short taps on the status page.
                  if (held_ms < 600) return;

                  // Very long press (4 seconds or more): request timer mode.
                  if (held_ms >= 4000) {
                    id(mqtt_client).publish("${mqtt_starlink_button_topic}", "timer");
