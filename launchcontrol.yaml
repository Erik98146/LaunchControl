  - platform: mqtt_subscribe
    id: mqtt_clock_text
    topic: ${mqtt_time_topic}
    internal: true
    on_value:
      - lambda: |-
          int yr, mon, day, hr, min, sec;
          if (sscanf(x.c_str(), "%d-%d-%d %d:%d:%d", &yr, &mon, &day, &hr, &min, &sec) == 6) {
            id(clock_year) = yr;
            id(clock_month) = mon;
            id(clock_day) = day;
            id(clock_hour) = hr;
            id(clock_minute) = min;
            id(clock_second) = sec;
            id(clock_valid) = true;

            auto leap = [](int year) -> bool {
              return ((year % 4 == 0) && (year % 100 != 0)) || (year % 400 == 0);
            };
            auto dim = [&](int year, int month) -> int {
              static const int days[] = {31,28,31,30,31,30,31,31,30,31,30,31};
              if (month == 2 && leap(year)) return 29;
              return days[month - 1];
            };
            auto normalize = [&](int &year, int &month, int &day, int &hour) {
              while (hour < 0) {
                hour += 24;
                day -= 1;
                if (day < 1) {
                  month -= 1;
                  if (month < 1) { month = 12; year -= 1; }
                  day = dim(year, month);
                }
              }
              while (hour >= 24) {
                hour -= 24;
                day += 1;
                int max_day = dim(year, month);
                if (day > max_day) {
                  day = 1;
                  month += 1;
                  if (month > 12) { month = 1; year += 1; }
                }
              }
            };
            auto dow = [](int year, int month, int day) -> int {
              if (month < 3) { month += 12; year -= 1; }
              int K = year % 100;
              int J = year / 100;
              int h = (day + (13 * (month + 1)) / 5 + K + K / 4 + J / 4 + 5 * J) % 7;
              return (h + 6) % 7;
            };
            auto nth_sunday = [&](int year, int month, int n) -> int {
              int first_dow = dow(year, month, 1);
              int first_sunday = (first_dow == 0) ? 1 : (8 - first_dow);
              return first_sunday + (n - 1) * 7;
            };

            int y = id(clock_year);
            int mo = id(clock_month);
            int d = id(clock_day);
            int h = id(clock_hour);
            int mi = id(clock_minute);

            const int offsets[] = {-8, -7, -6, -5};
            int tz = id(clock_tz_region);
            if (tz < 0 || tz > 3) tz = 0;
            h += offsets[tz];
            normalize(y, mo, d, h);

            bool dst = false;
            int start_day = nth_sunday(y, 3, 2);
            int end_day = nth_sunday(y, 11, 1);
            if (mo > 3 && mo < 11) dst = true;
            else if (mo == 3) dst = (d > start_day) || (d == start_day && h >= 2);
            else if (mo == 11) dst = (d < end_day) || (d == end_day && h < 2);

            if (dst) {
              h += 1;
              normalize(y, mo, d, h);
            }

            bool pm = h >= 12;
            int hr12 = h % 12;
            if (hr12 == 0) hr12 = 12;

            char tbuf[16];
            snprintf(tbuf, sizeof(tbuf), "%d:%02d", hr12, mi);
            lv_label_set_text(id(saver_time_label), tbuf);
            lv_label_set_text(id(saver_ampm_label), pm ? "PM" : "AM");
          }
  - platform: mqtt_subscribe
    id: temp_in_text
    topic: ${mqtt_temp_in_topic}
    internal: true
    on_value:
      - lambda: |-
          auto normalize_temp = [](std::string s) -> std::string {
            if (s.empty()) return std::string("--°");
            size_t deg = s.find("°");
            if (deg != std::string::npos) {
              s = s.substr(0, deg + std::string("°").size());
            } else {
              while (!s.empty() && (s.back() == 'F' || s.back() == 'f' || s.back() == ' ')) s.pop_back();
              s += "°";
            }
            return s;
          };
          std::string in_v = normalize_temp(x);
          std::string out_v = id(temp_out_text).has_state() ? normalize_temp(id(temp_out_text).state) : std::string("--°");
          std::string in_line = std::string("In: ") + in_v;
          std::string out_line = std::string("Out: ") + out_v;
          lv_label_set_text(id(dash_temp_in_label), in_line.c_str());
          lv_label_set_text(id(dash_temp_out_label), out_line.c_str());
          lv_label_set_text(id(climate_temp_in_label), in_line.c_str());
          lv_label_set_text(id(climate_temp_out_label), out_line.c_str());
          lv_label_set_text(id(saver_temp_in_label), in_line.c_str());
